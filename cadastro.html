<!DOCTYPE html>
<html lang="pt-BR">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cadastro - Dashboard Financeiro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css cadastro.css" />
    </head>
    <body>
        <main>
            <form>
                <div class="icone-cadeado"></div>

                <section class="cadastro">
                    <h1>Criar Conta</h1>
                    <h2>Comece a gerenciar suas finanças</h2>
                </section>

                <section class="nome">
                    <label for="nome-cadastro">Nome completo</label>
                    <input id="nome-cadastro" type="text" placeholder="João Silva">
                </section>

              <section class="email">
                  <label for="email-cadastro">Email</label>
                 <input id="email-cadastro" type="email" placeholder="seu@email.com">
              </section>

              <section class="senha">
                  <label for="senha-cadastro">Senha</label>
                  <input id="senha-cadastro" type="password" placeholder="••••••••">
              </section>

              <button type="submit" id="cadastrar">Cadastrar</button>

              <p>
                Já tem conta?
                <a href="login.html">Entrar</a>
              </p>
            </form>

            <div class="aviso">
                <p>Seus dados estão seguros e protegidos</p>
            </div>
        </main>
        <script src="cadastro.js"></script>
    </body>
</html>
