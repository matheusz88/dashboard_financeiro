<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Financial Mirror</title>

  <!-- FONTE INTER -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css login.css">
</head>
<body>

  <div class="layout-login">

    <div class="lado-empresa">

      <svg class="grafico-bg" viewBox="0 0 600 300" preserveAspectRatio="none">

        <polyline class="linha-verde"
          points="0,230 70,190 140,215 215,145 300,175 395,105 490,155 600,95"
          fill="none" stroke="#22c55e" stroke-width="3"/>

        <polyline class="linha-vermelha"
          points="0,170 85,185 160,150 240,210 335,185 430,245 540,220 600,245"
          fill="none" stroke="#ef4444" stroke-width="3"/>

      </svg>

      <div class="conteudo-empresa">
        <h1>Financial Mirror</h1>
        <p>Comece agora e assuma o controle da sua vida financeira.</p>
      </div>

    </div>

    <main class="container-login">

   <form class="form-login" id="formCadastro">

  <div class="icone-cadeado"></div>

  <section class="cabecalho-login">
    <h1>Criar Conta</h1>
    <p>Preencha os dados para começar</p>
  </section>

  <section class="campo">
    <label>Nome</label>
    <input id="nome" type="text" placeholder="Seu nome completo" required>
  </section>

  <section class="campo">
    <label>E-mail</label>
    <input id="email" type="email" placeholder="seuemail@gmail.com" required>
  </section>

  <section class="campo senha-box">
    <label>Senha</label>
    <input id="senha" type="password" required>
    <span class="toggle-senha" onclick="toggleSenha('senha')">👁️</span>
  </section>

  <section class="campo senha-box">
    <label>Confirmar senha</label>
    <input id="confirmar" type="password" required>
    <span class="toggle-senha" onclick="toggleSenha('confirmar')">👁️</span>
  </section>

  <div id="erro" class="erro"></div>

  <button type="submit" class="btn-entrar" id="btn">
    Criar conta
  </button>

  <p class="link-area">
    Já tem conta? <a href="login.html">Entrar</a>
  </p>

  <p class="seguro">Seus dados estão seguros</p>

</form>


<script src="cadastro.js"></script>
